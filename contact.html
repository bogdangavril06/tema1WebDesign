<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header><h1>Contact</h1></header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="data.html">Data</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <main id="main-content">
      <section>
        <h2>Contact</h2>
        <p>
          Pentru orice nelamurire, completeaza formularul de mai jos si putem
          lua legatura!
        </p>

        <form action="#" method="post">
          <fieldset>
            <legend>Formular de contact</legend>
            <p>
              <label for="nume">Nume complet:</label>
              <input type="text" id="nume" name="user_name" required />
            </p>
            <p>
              <label for="email">Adresa de email:</label>
              <input type="email" id="email" name="user_email" required />
            </p>

            <p>
              <label for="subiect">Subiect: </label>
              <select name="subject" id="subiect">
                <option value="proiect">Proiect Nou</option>
                <option value="intrebare">Intrebare</option>
                <option value="feedback">Feedback</option>
              </select>
            </p>
            <p>
              <label for="mesaj">Mesaj:</label>
              <textarea name="message" id="mesaj" rows="5" required></textarea>
            </p>
            <button type="submit">Trimite</button>
          </fieldset>
        </form>
      </section>
    </main>
    <footer>
      &copy; Gavril Bogdan Macsimilian | 2026 | Universitatea de Vest
    </footer>
  </body>
</html>
